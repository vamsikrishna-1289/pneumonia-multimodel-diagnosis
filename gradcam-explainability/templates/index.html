<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pneumonia Detection</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .container { max-width: 600px; margin-top: 50px; text-align: center; }
    img { width: 100%; max-width: 400px; margin-top: 20px; }
    .result { margin-top: 30px; }
  </style>
</head>
<body>
  <div class="container">
    <h2 class="mb-4">AI-Powered Pneumonia Detection</h2>
    <form id="uploadForm" enctype="multipart/form-data">
      <div class="mb-3">
        <input type="file" class="form-control" name="file" required accept="image/*">
      </div>
      <button type="submit" class="btn btn-primary">Analyze X-Ray</button>
    </form>
    <div class="result" id="result"></div>
  </div>

  <script>
    document.getElementById('uploadForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const formData = new FormData(this);
      const res = await fetch('/predict', { method: 'POST', body: formData });
      const data = await res.json();
      if (data.error) {
        document.getElementById('result').innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
      } else {
        document.getElementById('result').innerHTML = `
          <h4>Prediction: ${data.result}</h4>
          <img src="${data.cam_image}" alt="Grad-CAM Heatmap">
        `;
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pneumonia Detection</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            color: #333;
            padding: 20px;
            overflow: hidden;
        }
        .container {
            max-width: 500px;
            margin: 50px auto;
            background: rgba(255, 255, 255, 0.95);
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.3);
            animation: fadeIn 1s ease-in-out;
        }
        h1 {
            color: #ff3e78;
            font-size: 28px;
            margin-bottom: 20px;
            animation: bounce 1.5s infinite alternate;
        }
        input[type="file"] {
            margin: 15px 0;
            padding: 12px;
            border: 2px dashed #ff3e78;
            border-radius: 10px;
            background: #f9f9f9;
            cursor: pointer;
            transition: 0.3s;
        }
        input[type="file"]:hover {
            background: #f1f1f1;
        }
        button {
            background: linear-gradient(135deg, #ff3e78, #ff2b4b);
            color: white;
            padding: 14px 22px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.2s ease-in-out, box-shadow 0.3s;
            box-shadow: 0px 5px 15px rgba(255, 62, 120, 0.5);
        }
        button:hover {
            transform: scale(1.1);
            box-shadow: 0px 8px 20px rgba(255, 62, 120, 0.6);
        }
        #result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #28a745;
            animation: fadeIn 1s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Pneumonia Detection AI</h1>
        <form id="upload-form" enctype="multipart/form-data">
            <input type="file" id="file-input" accept="image/*" required><br>
            <button type="submit">Upload & Predict</button>
        </form>
        <p id="result"></p>
    </div>
    <script>
        document.getElementById("upload-form").addEventListener("submit", function(event) {
            event.preventDefault();
            let fileInput = document.getElementById("file-input").files[0];
            if (!fileInput) {
                alert("Please select an image.");
                return;
            }
            let formData = new FormData();
            formData.append("file", fileInput);
            fetch("/predict", {
                method: "POST",
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById("result").innerText = "Result: " + data.result;
            })
            .catch(error => {
                console.error("Error:", error);
                document.getElementById("result").innerText = "Error processing the image.";
            });
        });
    </script>
</body>
</html>
